function animateCount(el, from, to, duration) {
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    const current = Math.round(from + (to - from) * eased);
    el.textContent = current.toLocaleString();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ====== PLAYER DB ======
async function loadPlayerDb(lg) {
  if (playerDb[lg]) return;
  try {
    const r = await fetch(`/${lg.toLowerCase()}_players.json`);
    playerDb[lg] = await r.json();
  } catch(e) { playerDb[lg] = []; }
}

// ====== ESPN ======
async function fetchAthleteInfo(espnId, lg) {
  const key = `athlete:${lg}:${espnId}`;
  if (espnCache[key]) return espnCache[key];
  const sport = lg === "NFL" ? "football" : "basketball";
  const leaguePath = lg === "NFL" ? "nfl" : "nba";
  try {
    const resp = await fetch(`${ESPN_CORE}/${sport}/leagues/${leaguePath}/athletes/${espnId}`);
    if (!resp.ok) return null;
    const d = await resp.json();
    const result = { name: d.displayName || "?", imageUrl: (d.headshot && d.headshot.href) || "" };
    espnCache[key] = result;
    return result;
  } catch { return null; }
}

async function fetchCareerStats(espnId, lg) {
  const key = `career:${lg}:${espnId}`;
  if (espnCache[key]) return espnCache[key];
  const sport = lg === "NFL" ? "football" : "basketball";
  const leaguePath = lg === "NFL" ? "nfl" : "nba";
  try {
    const resp = await fetch(`${ESPN_CORE}/${sport}/leagues/${leaguePath}/athletes/${espnId}/statistics`);
    if (!resp.ok) return null;
    const d = await resp.json();
    const cats = (d.splits && d.splits.categories) || [];
    espnCache[key] = cats;
    return cats;
  } catch { return null; }
}

function extractCareerStat(categories, espnCat, espnStat) {
  if (!categories) return null;
  const cat = categories.find(c => c.name === espnCat);
  if (!cat || !cat.stats) return null;
  const s = cat.stats.find(st => st.name === espnStat);
  return s ? Number(s.value) || 0 : null;
}

async function fetchSeasonLog(espnId, lg) {
  const key = `seasonlog:${lg}:${espnId}`;
  if (espnCache[key]) return espnCache[key];
  const sport = lg === "NFL" ? "football" : "basketball";
  const leaguePath = lg === "NFL" ? "nfl" : "nba";
  try {
    const resp = await fetch(`${ESPN_CORE}/${sport}/leagues/${leaguePath}/athletes/${espnId}/statisticslog`);
    if (!resp.ok) return [];
    const d = await resp.json();
    const seasons = [];
    for (const entry of (d.entries || [])) {
      const teamIds = [];
      for (const s of (entry.statistics || [])) {
        const ref = s.team && s.team.$ref;
        if (ref) { const m = ref.match(/\/teams\/(\d+)/); if (m) teamIds.push(parseInt(m[1])); }
      }
      seasons.push({ teamIds });
    }
    espnCache[key] = seasons;
    return seasons;
  } catch { return []; }
}

function espnTeamIdToAbbr(teamId, lg) {
  const idMap = lg === "NFL" ? ESPN_NFL_IDS : ESPN_NBA_IDS;
  for (const [abbr, id] of Object.entries(idMap)) { if (id === teamId) return abbr; }
  return null;
}

async function playerPlayedForTeam(espnId, teamAbbr, lg) {
  const log = await fetchSeasonLog(espnId, lg);
  const targetId = (lg === "NFL" ? ESPN_NFL_IDS : ESPN_NBA_IDS)[teamAbbr];
  if (!targetId) return false;
  return log.some(s => s.teamIds.includes(targetId));
}

// ====== GAME ======
function newGame() {
  const allStats = STACK_STATS[league];
  const enabled = enabledCats[league];
  const stats = allStats.filter(s => enabled.has(s.cat));
  const stat = (stats.length > 0 ? stats : allStats)[Math.floor(Math.random() * (stats.length || allStats.length))];
  const target = stat.targets[Math.floor(Math.random() * stat.targets.length)];
  const teams = league === "NFL" ? NFL_TEAMS_ARR : NBA_TEAMS_ARR;

  // Pick 5 random teams
  const shuffled = [...teams].sort(() => Math.random() - 0.5);
  const slots = shuffled.slice(0, 5).map(t => ({ team: t, player: null, espnId: null, stat: null, spinning: false, revealed: false }));

  game = { stat, target, slots, done: false, total: 0 };
  activeSlot = -1;
  render();
}

// ====== SPIN ======
function getNextSpinIdx() {
  // Can only spin the next slot if all previous slots have players picked
  const firstUnfilled = game.slots.findIndex(s => !s.player);
  if (firstUnfilled >= 0 && game.slots[firstUnfilled].revealed) return -1; // must pick before spinning next
  return game.slots.findIndex(s => !s.revealed && !s.spinning);
}

function spinSlot(idx) {
  if (!game || game.done) return;
  if (idx !== getNextSpinIdx()) return;

  const slot = game.slots[idx];
  slot.spinning = true;
  render();

  // Focus input during user tap (required for mobile keyboard), but hide modal visually
  const modal = document.getElementById("searchModal");
  modal.classList.add("open");
  modal.style.opacity = "0";
  modal.style.pointerEvents = "none";
  const inp = document.getElementById("searchInput");
  inp.value = "";
  inp.focus();

  setTimeout(() => {
    slot.spinning = false;
    slot.revealed = true;
    activeSlot = idx;
    // Now reveal the modal
    modal.style.opacity = "";
    modal.style.pointerEvents = "";
    const s = game.slots[idx];
    const logos = league === "NFL" ? NFL_LOGOS : NBA_LOGOS;
    document.getElementById("modalTitle").innerHTML = `<img src="${logos[s.team]}" style="width:24px;height:24px;object-fit:contain;vertical-align:middle;margin-right:6px">${s.team} — Pick a player`;
    document.getElementById("errorMsg").textContent = "";
    document.getElementById("playerList").innerHTML = "";
    document.getElementById("searchStatus").textContent = "Type to search...";
    render();
  }, 1500);
}

// ====== RENDER ======
function render() {
  const area = document.getElementById("gameArea");
  if (!game) { area.innerHTML = ""; return; }

  const logos = league === "NFL" ? NFL_LOGOS : NBA_LOGOS;
  const allTeams = league === "NFL" ? NFL_TEAMS_ARR : NBA_TEAMS_ARR;
  let total = 0;
  game.slots.forEach(s => { if (s.stat != null) total += s.stat; });
  game.total = total;

  let html = `<div class="target-box">
    <div class="target-label">Target</div>
    <div class="target-stat">${game.stat.display}</div>
    <div class="target-number">${game.target.toLocaleString()}</div>
    ${hardMode && !game.done ? '<div class="running-total" style="color:#555">Current: <span class="current">???</span></div>' : `<div class="running-total">Current: <span class="current">${(pendingAnimation ? pendingAnimation.prevTotal : total).toLocaleString()}</span></div>`}
  </div>`;

  const anySpinning = game.slots.some(s => s.spinning);
  const nextIdx = anySpinning ? -1 : getNextSpinIdx();

  game.slots.forEach((slot, i) => {
    html += `<div class="slot-row">`;

    // Team logo / spinner / mystery
    if (slot.spinning) {
      const reelItems = [];
      for (let r = 0; r < 20; r++) reelItems.push(allTeams[Math.floor(Math.random() * allTeams.length)]);
      reelItems.push(slot.team);
      html += `<div class="slot-team"><div class="spinner-reel"><div class="spinner-reel-inner" id="reel${i}">`;
      reelItems.forEach(t => {
        html += `<div class="spinner-reel-item"><img src="${logos[t]}" alt="${t}"></div>`;
      });
      html += `</div></div></div>`;
    } else if (slot.revealed) {
      html += `<div class="slot-team"><img src="${logos[slot.team]}" alt="${slot.team}"></div>`;
    } else {
      html += `<div class="slot-team" style="font-size:28px;font-weight:800;color:#555">?</div>`;
    }

    // Player info or action
    if (slot.player) {
      const showStat = !hardMode || game.done;
      html += `${slot.imgUrl ? `<img src="${slot.imgUrl}" style="width:36px;height:36px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">` : ""}`;
      const isAnimating = pendingAnimation && pendingAnimation.slotIdx === i;
      const displayStat = !showStat ? "???" : isAnimating ? "0" : (slot.stat != null ? slot.stat.toLocaleString() : "—");
      html += `<div class="slot-info" style="display:flex;justify-content:space-between;align-items:center">
        <div class="slot-player-name">${esc(slot.player)}</div>
        <div class="slot-player-stat">${displayStat}</div>
      </div>`;
    } else if (slot.spinning) {
      html += `<div class="slot-info"><div class="slot-empty">Spinning...</div></div>`;
    } else if (slot.revealed) {
      html += `<div class="slot-info"><div class="slot-empty">Pick a player</div></div>
        <button class="slot-btn" onclick="openSearch(${i})">Pick</button>`;
    } else if (i === nextIdx) {
      html += `<div class="slot-info"><div class="slot-empty">Tap to spin</div></div>
        <button class="slot-btn" onclick="spinSlot(${i})">Spin</button>`;
    } else {
      html += `<div class="slot-info"><div class="slot-empty"></div></div>`;
    }
    html += `</div>`;
  });

  // Conclusion
  if (game.done) {
    const diff = total - game.target;
    const absDiff = Math.abs(diff);
    const pct = game.target > 0 ? Math.round((1 - absDiff / game.target) * 100) : 0;
    const diffClass = absDiff === 0 ? "perfect" : absDiff < game.target * 0.05 ? "close" : "far";
    const remark = absDiff === 0 ? "PERFECT!" : absDiff < game.target * 0.02 ? "So close!" : absDiff < game.target * 0.05 ? "Great job!" : absDiff < game.target * 0.15 ? "Not bad!" : "Better luck next time";
    const sign = diff > 0 ? "+" : diff < 0 ? "" : "";

    html += `<div class="stack-conclusion">
      <div class="result-remark">${remark}</div>
      <div class="result-diff ${diffClass}">${sign}${diff.toLocaleString()}</div>
      <div class="result-label">${total.toLocaleString()} / ${game.target.toLocaleString()}</div>
      <button class="share-btn" onclick="shareStack()">Share Results</button>
    </div>`;

    if (pct >= 95) setTimeout(launchConfetti, 300);
  }

  area.innerHTML = html;

  // Trigger spin animation
  game.slots.forEach((slot, i) => {
    if (slot.spinning) {
      const reel = document.getElementById("reel" + i);
      if (reel) {
        requestAnimationFrame(() => {
          reel.style.transform = `translateY(-${20 * 50}px)`;
        });
      }
    }
  });
}

function esc(s) { return s ? String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") : ""; }

// ====== SEARCH ======
function openSearch(idx) {
  if (!game || game.done) return;
  activeSlot = idx;
  document.getElementById("searchInput").value = "";
  document.getElementById("errorMsg").textContent = "";
  document.getElementById("playerList").innerHTML = "";
  document.getElementById("searchStatus").textContent = "Type to search...";
  const slot = game.slots[idx];
  const logos = league === "NFL" ? NFL_LOGOS : NBA_LOGOS;
  document.getElementById("modalTitle").innerHTML = `<img src="${logos[slot.team]}" style="width:24px;height:24px;object-fit:contain;vertical-align:middle;margin-right:6px">${slot.team} — Pick a player`;
  document.getElementById("searchModal").classList.add("open");
  const inp = document.getElementById("searchInput");
  inp.offsetHeight;
  inp.focus();
}

function closeSearch() {
  document.getElementById("searchModal").classList.remove("open");
  activeSlot = -1; searchResults = [];
}

let searchTimer = null;
document.getElementById("searchInput").addEventListener("input", function() {
  clearTimeout(searchTimer);
  const q = this.value.trim();
  if (q.length < 2) {
    document.getElementById("playerList").innerHTML = "";
    document.getElementById("searchStatus").textContent = "Type at least 2 characters...";
    return;
  }
  document.getElementById("searchStatus").textContent = "Searching...";
  searchTimer = setTimeout(() => doSearch(q), 300);
});

async function doSearch(q) {
  await loadPlayerDb(league);
  const db = playerDb[league] || [];
  const ql = q.toLowerCase();
  // Only show players with ESPN IDs (others can't fetch stats)
  // Also match partial first names: "will" matches "William"
  const words = ql.split(/\s+/);
  searchResults = db.filter(p => {
    if (!p.id) return false;
    const nl = p.n.toLowerCase();
    // Standard substring match
    if (nl.includes(ql)) return true;
    // Multi-word: match each word against name parts
    if (words.length > 1) {
      const nameParts = nl.split(/\s+/);
      return words.every(w => nameParts.some(np => np.startsWith(w)));
    }
    // Single word: match against any name part start
    return nl.split(/\s+/).some(np => np.startsWith(ql));
  }).slice(0, 15).map(p => ({
    espnId: p.id, name: p.n, position: p.p || "", debutYear: p.d || null, endYear: p.e || null, active: !!p.a
  }));
  const list = document.getElementById("playerList");
  const status = document.getElementById("searchStatus");
  if (!searchResults.length) { list.innerHTML = ""; status.textContent = "No players found."; return; }
  status.textContent = `${searchResults.length} player${searchResults.length > 1 ? "s" : ""} found`;
  list.innerHTML = searchResults.map((p, i) => {
    let detail = "";
    if (p.debutYear) {
      const end = p.active ? "pres." : (p.endYear || "");
      detail = league === "NFL" && p.position ? `${p.position} · ${p.debutYear}-${end}` : `${p.debutYear}-${end}`;
    }
    return `<li class="player-list-item" data-pidx="${i}"><span class="pname">${esc(p.name)}</span><span class="pyears">${esc(detail)}</span></li>`;
  }).join("");
}

document.getElementById("playerList").addEventListener("click", e => {
  const item = e.target.closest("[data-pidx]");
  if (item) submitPlayer(+item.dataset.pidx);
});

async function submitPlayer(idx) {
  const p = searchResults[idx];
  if (!p || activeSlot < 0 || submitting) return;

  let espnId = p.espnId;
  if (!espnId) {
    // Resolve ESPN ID — try multiple search queries (full name, stripped suffix, last name)
    const pNorm = p.name.toLowerCase().replace(/ jr\.?$| sr\.?$| ii$| iii$| iv$| v$/i, "").trim();
    const nameParts = p.name.split(" ");
    const queries = [p.name];
    if (pNorm !== p.name.toLowerCase()) queries.push(pNorm);
    if (nameParts.length > 1) queries.push(nameParts[nameParts.length - 1]);

    for (const q of queries) {
      if (espnId) break;
      try {
        const resp = await fetch(`${ESPN_SEARCH}?query=${encodeURIComponent(q)}&limit=10&type=player&sport=${league === "NFL" ? "football" : "basketball"}`);
        const data = await resp.json();
        const match = (data.items || []).find(i => {
          const dn = (i.displayName || "").toLowerCase();
          const dnNorm = dn.replace(/ jr\.?$| sr\.?$| ii$| iii$| iv$| v$/i, "").trim();
          return dn === p.name.toLowerCase() || dnNorm === pNorm || dn.includes(pNorm) || pNorm.includes(dnNorm);
        });
        if (match) espnId = String(match.id);
      } catch {}
    }
    if (!espnId) {
      document.getElementById("errorMsg").textContent = "Could not find stats for this player.";
      submitting = false;
      document.getElementById("searchStatus").textContent = "";
      return;
    }
  }

  submitting = true;
  document.getElementById("searchStatus").innerHTML = '<span class="spinner"></span> Checking...';
  document.getElementById("errorMsg").textContent = "";

  try {
    // Verify player played for this team
    const slot = game.slots[activeSlot];
    const played = await playerPlayedForTeam(espnId, slot.team, league);
    if (!played) {
      document.getElementById("errorMsg").textContent = `${p.name} never played for ${slot.team}.`;
      submitting = false;
      document.getElementById("searchStatus").textContent = "";
      return;
    }

    // Fetch career stats
    const cats = await fetchCareerStats(espnId, league);
    const val = extractCareerStat(cats, game.stat.espnCat, game.stat.espnStat);
    if (val == null) {
      document.getElementById("errorMsg").textContent = `No ${game.stat.display} data found.`;
      submitting = false;
      document.getElementById("searchStatus").textContent = "";
      return;
    }

    // Fetch headshot
    const info = await fetchAthleteInfo(espnId, league);
    slot.player = p.name;
    slot.espnId = espnId;
    slot.stat = val;
    slot.imgUrl = (info && info.imageUrl) || "";

    if (game.slots.every(s => s.player)) game.done = true;
    closeSearch();

    // Set up animation before render
    const slotIdx = game.slots.indexOf(slot);
    let prevTotal = 0;
    game.slots.forEach((s, si) => { if (si !== slotIdx && s.stat != null) prevTotal += s.stat; });
    const newTotal = prevTotal + val;
    if (!hardMode && !game.done) {
      pendingAnimation = { slotIdx, statVal: val, prevTotal, newTotal };
    }

    render();

    // Run the animation
    if (pendingAnimation) {
      setTimeout(() => {
        const statEl = document.querySelectorAll(".slot-player-stat")[slotIdx];
        const totalEl = document.querySelector(".running-total .current");
        if (statEl) animateCount(statEl, 0, val, 800);
        if (totalEl) animateCount(totalEl, prevTotal, newTotal, 800);
        setTimeout(() => { pendingAnimation = null; }, 850);
      }, 50);
    }
  } catch (e) {
    document.getElementById("errorMsg").textContent = "Error fetching stats. Try again.";
  }
  submitting = false;
  document.getElementById("searchStatus").textContent = "";
}

// ====== SHARE ======
function shareStack() {
  if (!game) return;
  const diff = game.total - game.target;
  const sign = diff > 0 ? "+" : "";
  const text = `StatStacker Stack ${league === "NFL" ? "\uD83C\uDFC8" : "\uD83C\uDFC0"}\n${game.stat.display}\nTarget: ${game.target.toLocaleString()}\nResult: ${game.total.toLocaleString()} (${sign}${diff.toLocaleString()})\nstatstacker.com/stack`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(".share-btn");
    if (btn) { btn.textContent = "Copied!"; btn.classList.add("copied"); setTimeout(() => { btn.textContent = "Share Results"; btn.classList.remove("copied"); }, 2000); }
  });
}

// ====== CONFETTI ======
function launchConfetti() {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const particles = [];
  const colors = ["#4CAF50","#ffc107","#00bcd4","#ff5722","#e91e63","#9c27b0","#fff"];
  for (let i = 0; i < 120; i++) {
    particles.push({ x: Math.random()*canvas.width, y: -10-Math.random()*40, w: 4+Math.random()*6, h: 6+Math.random()*8,
      vx: (Math.random()-0.5)*4, vy: 2+Math.random()*4, rot: Math.random()*360, vr: (Math.random()-0.5)*10,
      color: colors[Math.floor(Math.random()*colors.length)], life: 1 });
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      if (p.life <= 0) continue; alive = true;
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.rot += p.vr; p.life -= 0.008;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
    }
    if (alive && ++frame < 180) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(draw);
}

// ====== NAV ======
// ====== CATEGORIES ======
const enabledCats = { NFL: new Set(STACK_STATS.NFL.map(s => s.cat)), NBA: new Set(STACK_STATS.NBA.map(s => s.cat)) };

function showCategories() {
  const stats = STACK_STATS[league];
  const enabled = enabledCats[league];
  document.getElementById("catList").innerHTML = stats.map(s =>
    `<div class="cat-item">
      <input type="checkbox" id="scat_${s.cat}" ${enabled.has(s.cat) ? "checked" : ""}>
      <label for="scat_${s.cat}">${s.display}</label>
    </div>`
  ).join("");
  document.getElementById("categoriesModal").classList.add("open");
}
function closeCategories() { document.getElementById("categoriesModal").classList.remove("open"); }
function toggleAllCats() {
  const cbs = document.querySelectorAll("#catList input[type=checkbox]");
  const allOn = [...cbs].every(c => c.checked);
  cbs.forEach(c => c.checked = !allOn);
}
function applyCats() {
  const stats = STACK_STATS[league];
  const enabled = enabledCats[league];
  enabled.clear();
  stats.forEach(s => { const cb = document.getElementById("scat_" + s.cat); if (cb?.checked) enabled.add(s.cat); });
  if (enabled.size === 0) enabled.add(stats[0].cat);
  closeCategories();
  newGame();
}
document.getElementById("categoriesModal").addEventListener("click", e => {
  if (e.target === document.getElementById("categoriesModal")) closeCategories();
});

function toggleHard() {
  hardMode = !hardMode;
  document.getElementById("hardBtn").classList.toggle("active", hardMode);
  if (game) render();
}

function switchLeague(lg) {
  league = lg;
  document.querySelectorAll(".league-btn").forEach(b => b.classList.toggle("active", b.dataset.league === lg));
  newGame();
}

document.addEventListener("click", e => {
  const menu = document.getElementById("modeMenu");
  if (menu.classList.contains("open") && !e.target.closest(".mode-menu") && !e.target.closest("h1")) menu.classList.remove("open");
});
document.getElementById("searchModal").addEventListener("click", e => { if (e.target === document.getElementById("searchModal")) closeSearch(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeSearch(); });

// Init
newGame();
</script>
